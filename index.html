/* ── ILLUSTRATIONS (SVG strings) ── */
function stars(n, seed, maxY) {
  let x = seed, out = '';
  const rng = () => { x=(x*1664525+1013904223)&0xffffffff; return (x>>>0)/0xffffffff; };
  for (let i=0;i<n;i++) {
    const cx=(rng()*860).toFixed(1), cy=(rng()*maxY).toFixed(1);
    const r=(rng()*.7+.2).toFixed(1), op=(rng()*.45+.15).toFixed(2), dur=(rng()*3+1.5).toFixed(1);
    const op2=(+op*.3).toFixed(2), op3=Math.min(1,+op*2.2).toFixed(2);
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="#fff" opacity="${op}"><animate attributeName="opacity" values="${op2};${op3};${op2}" dur="${dur}s" repeatCount="indefinite"/></circle>`;
  }
  return out;
}

function vbox(verse, accent) {
  if (!verse) return '';
  return `<div class="verse-box" style="background:${accent}12;border:1px solid ${accent}33">
    <p class="verse-text">${verse.t}</p>
    <p class="verse-ref" style="color:${accent}">${verse.r}</p>
  </div>`;
}

function renderSlide(s, accent) {
  switch(s.type) {
    case 'cover': return `
      <div class="cover-wrap">
        <div class="cover-ar anim-0" style="color:${accent}">${s.titleAr}</div>
        <div class="cover-title anim-1">${s.title}</div>
        <div class="cover-sub anim-2" style="color:${accent}">${s.sub}</div>
        <div class="cover-tag anim-3">${s.tagline}</div>
        <div class="anim-4">${vbox(s.verse, accent)}</div>
      </div>`;

    case 'quote': return `
      <div class="quote-wrap">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <p class="big-quote anim-1">${s.bigQuote}</p>
        <p class="body-text anim-2">${s.body}</p>
      </div>`;

    case 'bio': return `
      <div class="slide-wrap">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title anim-1">${s.title}</h2>
        ${s.facts.map((f,i)=>`
          <div class="fact-row anim-${Math.min(i+2,7)}">
            <span class="fact-label" style="color:${accent}">${f.l}</span>
            <span class="fact-sep" style="background:${accent}44"></span>
            <span class="fact-value">${f.v}</span>
          </div>`).join('')}
      </div>`;

    case 'portrait': return `
      <div class="slide-wrap-sm">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title anim-1">${s.title}</h2>
        <div class="quality-grid anim-2">
          ${s.qualities.map(q=>`
            <div class="quality-row">
              <span class="quality-word" style="color:${accent}">${q.w}</span>
              <span class="quality-line">${q.l}</span>
            </div>`).join('')}
        </div>
        <div class="anim-3">${vbox(s.verse, accent)}</div>
      </div>`;

    case 'people': return `
      <div class="slide-wrap-sm">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title anim-1">${s.title}</h2>
        <div class="pillars-grid anim-2">
          ${s.pillars.map(p=>`
            <div class="pillar-card" style="background:${accent}10;border:1px solid ${accent}28">
              <div class="pillar-icon">${p.icon}</div>
              <div class="pillar-label" style="color:${accent}">${p.label}</div>
              <div class="pillar-desc">${p.desc}</div>
            </div>`).join('')}
        </div>
        <div class="anim-3">${vbox(s.verse, accent)}</div>
      </div>`;

    case 'versedetail': return `
      <div class="slide-wrap" style="display:flex;flex-direction:column;justify-content:center;min-height:360px">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title anim-1">${s.title}</h2>
        <div class="anim-2">
          <blockquote class="blockquote-verse" style="border-left-color:${accent}">${s.vHero}</blockquote>
          <div class="verse-ref-sm" style="color:${accent}">${s.vRef}</div>
        </div>
        <div class="insight-box anim-3" style="background:${accent}12;border:1px solid ${accent}28">
          <p class="insight-text" style="color:#98b8c8">${s.insight}</p>
        </div>
      </div>`;

    case 'tawhid': return `
      <div class="slide-wrap-sm">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title anim-1">${s.title}</h2>
        <div class="steps-list anim-2">
          ${s.steps.map(st=>`
            <div class="step-card" style="background:${accent}0d;border:1px solid ${accent}22">
              <span class="step-n" style="color:${accent}">${st.n}</span>
              <div>
                <div class="step-label">${st.label}</div>
                <div class="step-text">${st.text}</div>
              </div>
            </div>`).join('')}
        </div>
        <div class="anim-3">${vbox(s.verse, accent)}</div>
      </div>`;

    case 'revelation': return `
      <div class="slide-wrap" style="display:flex;flex-direction:column;justify-content:center;min-height:360px">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <div class="anim-1" style="font-size:10px;color:${accent}88;letter-spacing:1px;margin-bottom:16px">${s.eyebrow}</div>
        <blockquote class="revelation-verse anim-2" style="border-left-color:${accent}">${s.verse}</blockquote>
        <div class="insight-box anim-3" style="background:${accent}12;border:1px solid ${accent}28">
          <p class="insight-text" style="color:#a0c8b0">${s.insight}</p>
        </div>
      </div>`;

    case 'ethics': return `
      <div class="slide-wrap">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title anim-1">${s.title}</h2>
        <div class="ethics-body anim-2" style="border-left-color:${accent}55">
          <p class="ethics-text">${s.body}</p>
        </div>
        <div class="anim-3">${vbox(s.verse1, accent)}</div>
        <div class="ethics-insight anim-4" style="background:${accent}0d;border:1px solid ${accent}22">
          <p class="ethics-insight-text">${s.insight}</p>
        </div>
      </div>`;

    case 'method': return `
      <div class="slide-wrap">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title-lg anim-1">${s.title}</h2>
        <div class="traits-grid anim-2">
          ${s.traits.map(t=>`
            <div class="trait-row">
              <span class="trait-word" style="color:${accent}">${t.w}</span>
              <span class="trait-line">${t.l}</span>
            </div>`).join('')}
        </div>
        <div class="anim-3">${vbox(s.verse, accent)}</div>
      </div>`;

    case 'dialogue': return `
      <div class="slide-wrap-sm">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <div class="dialogue-grid anim-1">
          <div>
            <div class="dialogue-head" style="color:#CC4444">${s.labelL}</div>
            ${s.exchanges.map(e=>`<div class="dialogue-bubble" style="background:#CC444414;border:1px solid #CC444428;color:#e0b8a8">${e.them}</div>`).join('')}
          </div>
          <div>
            <div class="dialogue-head" style="color:#C9991A">${s.labelR}</div>
            ${s.exchanges.map(e=>`<div class="dialogue-bubble" style="background:#C9991A14;border:1px solid #C9991A28;color:#e8d89a">${e.him}</div>`).join('')}
          </div>
        </div>
        <div class="anim-2">${vbox(s.verse, accent)}</div>
      </div>`;

    case 'solitude': return `
      <div class="solitude-wrap">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <p class="big-quote2 anim-1">${s.bigQuote}</p>
        <p class="solitude-body anim-2">${s.body}</p>
        <div class="coda-box anim-3" style="background:${accent}15;border:1px solid ${accent}35">
          <span class="coda-text" style="color:${accent}">${s.coda}</span>
        </div>
      </div>`;

    case 'punishment': return `
      <div class="slide-wrap-sm">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title-lg anim-1">${s.title}</h2>
        <p class="anim-2" style="font-size:13px;color:#606090;margin:0 0 14px;font-style:italic">${s.desc}</p>
        <div class="events-list anim-3">
          ${s.events.map(e=>`
            <div class="event-card" style="background:${accent}0c;border:1px solid ${accent}22">
              <div class="event-bar" style="background:${accent}"></div>
              <div>
                <div class="event-title" style="color:${accent}">${e.t}</div>
                <div class="event-desc">${e.d}</div>
              </div>
            </div>`).join('')}
        </div>
        <div class="anim-4">${vbox(s.verse, accent)}</div>
      </div>`;

    case 'legacy': return `
      <div class="slide-wrap">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title-lg anim-1">${s.title}</h2>
        <div class="stats-grid anim-2">
          ${s.stats.map(st=>`
            <div class="stat-card" style="background:${accent}10;border:1px solid ${accent}28">
              <div class="stat-n" style="color:${accent}">${st.n}</div>
              <div class="stat-label">${st.label}</div>
            </div>`).join('')}
        </div>
        <div class="legacy-note anim-3" style="border-left-color:${accent}55">
          <p class="legacy-note-text">${s.note}</p>
        </div>
      </div>`;

    case 'lessons': return `
      <div class="slide-wrap-sm">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <h2 class="slide-title anim-1">${s.title}</h2>
        <div class="lessons-grid anim-2">
          ${s.lessons.map(l=>`
            <div class="lesson-card" style="background:${accent}0e;border:1px solid ${accent}25">
              <span class="lesson-n" style="color:${accent}">${l.n}</span>
              <div>
                <div class="lesson-title">${l.t}</div>
                <div class="lesson-body">${l.b}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;

    case 'mirror': return `
      <div class="mirror-wrap">
        <div class="chap anim-0" style="color:${accent}">${s.chapter}</div>
        <p class="mirror-question anim-1">${s.question}</p>
        <div class="reflections anim-2">
          ${s.reflections.map((r,i)=>`
            <div class="reflection-row">
              <div class="reflection-num" style="border-color:${accent}55;color:${accent}">${i+1}</div>
              <span class="reflection-text">${r}</span>
            </div>`).join('')}
        </div>
        <div class="mirror-coda anim-3" style="border-left-color:${accent}55">
          <p class="mirror-coda-text" style="color:${accent}">${s.coda}</p>
        </div>
      </div>`;

    case 'closing': return `
      <div class="closing-wrap">
        <div class="closing-pills anim-0">
          ${s.title.split(' · ').map(w=>`<span class="closing-pill" style="background:${accent}1a;border-color:${accent}55;color:${accent}">${w}</span>`).join('')}
        </div>
        <div class="anim-1">${vbox(s.verse, accent)}</div>
        <div class="dua-box anim-2" style="background:#0d1a2e;border:1px solid ${accent}33">
          <div class="dua-arabic" style="color:${accent}">${s.dua}</div>
          <p class="dua-fr">${s.duaFr}</p>
        </div>
      </div>`;

    default: return '';
  }
}

let cur = 0;
const total = SLIDES.length;

function render(idx) {
  const s = SLIDES[idx];
  const accent = s.accent;
  const card = document.getElementById('card');
  const illusEl = document.getElementById('card-illus');
  const bodyEl = document.getElementById('card-body');

  card.style.background = s.bg;
  card.style.border = `1px solid ${accent}20`;
  card.style.boxShadow = `0 8px 60px ${accent}0c`;
  illusEl.innerHTML = getIllus(idx);
  bodyEl.innerHTML = renderSlide(s, accent);

  document.getElementById('prog-fill').style.width = `${((idx+1)/total)*100}%`;
  document.getElementById('prog-fill').style.background = accent;
  document.getElementById('chap-label').textContent = s.chapter || '—';
  document.getElementById('chap-label').style.color = accent;
  document.getElementById('slide-num').textContent = `${idx+1} / ${total}`;

  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.disabled = idx === 0;
  prev.style.background = idx === 0 ? '#090e18' : '#162030';
  prev.style.color = idx === 0 ? '#1a2535' : '#6080a0';
  next.disabled = idx === total-1;
  next.style.background = idx === total-1 ? '#090e18' : accent;
  next.style.color = idx === total-1 ? '#1a2535' : '#1a0d00';
  next.style.fontWeight = 'bold';

  const dots = document.getElementById('dots');
  dots.innerHTML = SLIDES.map((_,i) => `<button class="dot" onclick="goto(${i})" style="width:${i===idx?20:6}px;background:${i===idx?accent:'#162030'}"></button>`).join('');
}

function go(dir) {
  cur = Math.max(0, Math.min(total-1, cur+dir));
  render(cur);
}
function goto(i) { cur=i; render(i); }

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') go(1);
  if (e.key==='ArrowLeft') go(-1);
});

render(0);
</script>
</body>
